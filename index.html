<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THNARAK BORIBOON</title>

  <!-- Minimal Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Outfit:wght@300;400;600;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <!-- Base Ambient Layers -->
  <div class="sunset-bg"></div>
  <div class="ambient-vignette"></div>

  <!-- Procedural Spark Particles -->
  <div class="particle-system" id="particles"></div>

  <!-- Interactive Mouse Spotlight -->
  <div class="mouse-spotlight"></div>

  <!-- 2D Universe Container -->
  <main class="universe-container">
    <div class="scene-2d">

      <!-- Centerpiece Subject -->
      <div class="subject-container">

        <!-- Deep Ambient Core Glow -->
        <div class="core-aura"></div>

        <!-- The Subject -->
        <h1 class="sunset-text" data-text="THNARAK">THNARAK</h1>

        <!-- Divider & Subtitle -->
        <div class="decorative-line">
          <div class="line-glow"></div>
        </div>
        <p class="subtitle">Thnarak &middot; Boriboon</p>

      </div>
    </div>
  </main>

</body>

</html>
